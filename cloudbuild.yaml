steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/line-linear-bot/app:$SHORT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/line-linear-bot/app:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/line-linear-bot/app"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - line-linear-bot
      - "--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/line-linear-bot/app:$SHORT_SHA"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--quiet"

images:
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/line-linear-bot/app:$SHORT_SHA"
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/line-linear-bot/app:latest"
