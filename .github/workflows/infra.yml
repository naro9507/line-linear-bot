name: Infra

on:
  # 任意のタイミングで手動実行
  workflow_dispatch:
    inputs:
      stack:
        description: "Pulumi stack name"
        required: true
        default: "prod"

jobs:
  # ---- Plan ------------------------------------------------
  # infra/ の変更内容をプレビューして差分を表示する
  plan:
    name: pulumi preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: pulumi preview
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ inputs.stack }}
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ---- Apply -----------------------------------------------
  # plan の内容を確認した上で承認してから適用する
  # GitHub の Environment "infra-prod" に required reviewers を設定すること
  apply:
    name: pulumi up
    needs: plan
    runs-on: ubuntu-latest
    environment: infra-prod # ← ここで承認ゲートが発動する
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ inputs.stack }}
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
